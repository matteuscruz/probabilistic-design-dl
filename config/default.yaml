model:
  name: naive_bayes

data:
  dataset: iris
  features: [0, 1]
  root: data
  mnist_name: MNIST
  mnist_corrupted_name: MNIST_corrupted

split:
  test_size: 0.2
  random_state: 42
  stratify: true

train:
  epochs: 500
  learning_rate: 0.01
  seed: 42
  verbose: 0

artifacts:
  enabled: true
  base_dir: artifacts
  save_model: true
  save_history: true
  save_figures: true
  naive_binary_epochs: 50

eval:
  metric: accuracy
